{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- Left sidebar -->
    {% comment %} load the sidebar here {% endcomment %}
    {% include 'dashboard/sidebar.html' %}

    <!-- Right sidebar content -->
    <div class="col-md-9">
        <h2>Add New Category</h2>
        <form action="{% url 'add_categories' %}" method="POST" style="width:500px;">
            {% csrf_token %}
            {{form | crispy}}
            <button type="submit" class="btn btn-warning">
                Submit
            </button>
        </form>
        <br>
    
  
    </div>
</div>

{% endblock %}
